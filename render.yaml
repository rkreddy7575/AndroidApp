services:
  - type: web
    name: trailbook-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: trailbook-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: trailbook-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: trailbook-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: trailbook-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: trailbook-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: trailbook-db
    plan: free
    region: oregon
